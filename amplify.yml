version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "🫠 Amplify 배포 시작",
                "color": 3447003,
                "fields": [
                  {"name": "앱", "value": "piece-admin-web-dev", "inline": true},
                  {"name": "브랜치", "value": "'"$AWS_BRANCH"'", "inline": true}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"
        - nvm install 22
        - nvm use 22
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - |
          curl -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "title": "✅ Amplify 배포 성공",
                "color": 5763719,
                "fields": [
                  {"name": "앱", "value": "piece-admin-web-dev", "inline": true},
                  {"name": "브랜치", "value": "'"$AWS_BRANCH"'", "inline": true}
                ],
                "timestamp": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
              }]
            }' \
            "$DISCORD_WEBHOOK_URL"
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .npm/**/*

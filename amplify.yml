version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"🫠 **Amplify 배포 시작**\n앱: piece-admin-web-dev\n브랜치: $AWS_BRANCH\"}" \
            "$DISCORD_WEBHOOK_URL"
        - nvm install 22
        - nvm use 22
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
    postBuild:
      commands:
        - |
          if [ "$AMPLIFY_JOB_STATUS" = "SUCCEED" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"✅ **Amplify 배포 성공**\n앱: piece-admin-web-dev\n브랜치: $AWS_BRANCH\"}" \
              "$DISCORD_WEBHOOK_URL"
          else
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"❌ **Amplify 배포 실패**\n앱: piece-admin-web-dev\n브랜치: $AWS_BRANCH\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
      - .npm/**/*

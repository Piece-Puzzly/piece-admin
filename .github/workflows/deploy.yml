name: Deploy to EC2

on:
  push:
    branches:
      - prod # main 브랜치 푸시 시 실행

concurrency:
  group: deploy-to-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "[CLEANUP] Removing npm logs and temp files..."
            rm -rf ~/.npm/_logs/*
            rm -rf /tmp/*

            echo "[CLEANUP] Cleaning apt cache..."
            sudo apt-get clean
            sudo rm -rf /var/cache/apt/archives/*

            echo "[CLEANUP] Cleaning npm cache..."
            npm cache clean --force

            echo "[CLEANUP] Clearing pm2 logs..."
            pm2 flush || true

            pm2 stop all
            pm2 delete all
            rm -rf piece-admin
            git clone -b prod --single-branch https://singrum2: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@github.com/singrum2/piece-admin.git
            cp config/.env piece-admin/.env
            cd piece-admin
            npm install
            npm run build
            pm2 start npm --name "next-app" -- start
            pm2 save
